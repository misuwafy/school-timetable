<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHMHS Alathiyur - Timetable Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-school"></i>
                <div>
                    <h2>TimeMaster</h2>
                    <p style="font-size:11px;opacity:0.8;margin-top:2px;">KHMHS Alathiyur</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard">
                    <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="classes">
                    <i class="fas fa-chalkboard"></i><span>Classes</span>
                </a>
                <a href="#" class="nav-item" data-page="teachers">
                    <i class="fas fa-user-tie"></i><span>Teachers</span>
                </a>
                <a href="#" class="nav-item" data-page="blocks">
                    <i class="fas fa-building"></i><span>Blocks</span>
                </a>
                <a href="#" class="nav-item" data-page="timetable">
                    <i class="fas fa-calendar-alt"></i><span>Timetable</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 id="pageTitle">Dashboard</h1>
            </header>
            <div class="content-area" id="contentArea">
                <!-- Dynamic content loaded here -->
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
