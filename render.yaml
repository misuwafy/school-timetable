services:
  - type: web
    name: kkhms-timetable
    runtime: python
    pythonVersion: "3.11.6"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /var/data/timetable.db
    disk:
      name: timetable-data
      mountPath: /var/data
      sizeGB: 1
