name: Deploy to Server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /var/www/school-timetable && git pull origin master
            kill $(pgrep -f uvicorn) || true
            sleep 2
            cd /var/www/school-timetable/backend
            nohup /var/www/school-timetable/backend/venv/bin/uvicorn main:app --host 127.0.0.1 --port 8000 > /var/log/school-timetable.log 2>&1 &
            echo "✅ Deployed at $(date)"
